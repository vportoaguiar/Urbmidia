name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'checking-dashboard/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./checking-dashboard
        run: npm install

      - name: Build
        working-directory: ./checking-dashboard
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./checking-dashboard/dist
          destination_dir: checking-dashboard
          cname: false
